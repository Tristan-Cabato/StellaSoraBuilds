<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stella Sora Builds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="https://media.tenor.com/lMaXIFa24C0AAAAe/stella-sora-shimiao-shimiao.png" type="image/png">
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div id="loading-screen" class="fixed inset-0 flex items-center justify-center bg-[#0a0a1a] z-50">
        <div class="text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-cyan-300 font-orbitron text-lg glow-text">Loading Builds...</p>
        </div>
    </div>
    
    <div id="sidebar" class="sidebar"></div>
    <div id="app" class="container mx-auto p-6 space-y-8 relative z-10 ml-20"></div>
    <div id="character-modal" class="character-modal"></div>
    <div id="user-modal" class="user-modal"></div>
    <div id="alts-modal" class="alts-modal"></div>
    
    <script src="particles.js"></script>
    <script src="script.js"></script>
</body>
</html>
